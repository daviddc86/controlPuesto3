name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  # 🟢 TRUCO: Forzar a GitHub a leerlo al subir cambios
  push:
    branches: [ main ]

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Latido
        run: |
          curl -X POST "https://yidlijflttmrlqtoxfqb.supabase.co/rest/v1/logs_conexion" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{}'