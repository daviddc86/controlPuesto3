name: 💓 Supabase Keep Alive (Evitar Pausa)

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 00:00 UTC (puedes cambiar la hora si quieres)
    - cron: '0 0 * * *'
  workflow_dispatch: # Esto te permite activar el botón "Play" manualmente desde la web de GitHub para probarlo

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Enviar Latido a la Base de Datos
        run: |
          curl -X POST "https://lpepyawwwydlpklmdmft.supabase.co/rest/v1/logs_conexion" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{}'
          echo "Latido enviado con éxito. Proyecto a salvo de congelación." 